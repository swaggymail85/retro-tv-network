<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Retro TV Network - Lobby</title>
  <style>
    body { background: #0c0c0e; color: #fff; font-family: sans-serif; padding: 50px; text-align: center; }
    .container { max-width: 600px; margin: 0 auto; }
    .station-list { background: #1a1b1e; padding: 20px; border-radius: 10px; margin-bottom: 30px; text-align: left; }
    .station-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; align-items: center; }
    a { color: #00ff00; text-decoration: none; font-weight: bold; }
    input, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; font-size: 14px; }
    input { width: 70%; background: #222; color: #fff; border: 1px solid #444; }
    button { background: #4a4d53; color: white; cursor: pointer; font-weight: bold; }
    button:hover { background: #60646c; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📺 Retro TV Station Network</h1>
    <p>Tune into a community broadcast or establish your own station.</p>
    
    <h2>Active Channels</h2>
    <div class="station-list" id="stations">Loading live signals...</div>

    <h2>Broadcast Your Own Channel</h2>
    <input type="text" id="roomName" placeholder="Station Name (e.g., Toonami Retro)"><br>
    <input type="text" id="videoUrl" placeholder="Paste single YouTube link OR whole Playlist URL"><br>
    <button onclick="handleCreation()">Launch Station</button>
  </div>

  <script>
    // Fetch and display active rooms on page load
    fetch('/api/rooms')
      .then(res => res.json())
      .then(rooms => {
        const div = document.getElementById('stations');
        if(rooms.length === 0) { div.innerHTML = "No stations broadcasting right now."; return; }
        div.innerHTML = '';
        rooms.forEach(room => {
          div.innerHTML += `
            <div class="station-item">
              <span>📡 <strong>${room.name}</strong> (${room.tracksCount} videos)</span>
              <a href="/room.html?id=${room.id}">TUNE IN ➔</a>
            </div>`;
        });
      });

    // Fetches the playlist data endpoint directly via the user's trusted browser
    async function extractPlaylistIds(playlistId) {
      try {
        const response = await fetch(`https://www.youtube.com/embed/videoseries?list=${playlistId}`);
        const text = await response.text();
        const regex = /\"videoId\":\"([a-zA-Z0-9_-]{11})\"/g;
        const ids = new Set();
        let match;
        while ((match = regex.exec(text)) !== null) {
          ids.add(match[1]);
        }
        return Array.from(ids);
      } catch (e) {
        console.error("Extraction error:", e);
        return [];
      }
    }

    async function handleCreation() {
      const name = document.getElementById('roomName').value.trim();
      const urlInput = document.getElementById('videoUrl').value.trim();

      if(!name || !urlInput) {
        alert("Please fill out both fields!");
        return;
      }

      let playlist = [];

      // Check if URL has a list parameter anywhere in it
      if (urlInput.includes('list=')) {
        // This handles standard URLs as well as watch links wrapped inside a playlist
        const match = urlInput.match(/[&?]list=([^&]+)/);
        const playlistId = (match && match[1]) ? match[1] : null;
        
        if (playlistId) {
          document.getElementById('stations').innerText = "Extracting video sync targets via browser... Please wait.";
          playlist = await extractPlaylistIds(playlistId);
        }
      } else {
        // Fallback for single video parsing
        const regExp = /^.*(?:(?:youtu\.be\/|v\/|vi\/|u\/\w\/|embed\/|shorts\/)|(?:(?:watch)?\?v(?:i)?=|\&v(?:i)?=))([^#\&\?]*).*/;
        const match = urlInput.match(regExp);
        const videoId = (match && match[1].length === 11) ? match[1] : urlInput;
        if (videoId.length === 11) playlist.push(videoId);
      }

      if (playlist.length === 0) {
        alert("Could not extract any valid YouTube IDs. Verify the playlist is Public or try copying the clean playlist URL from your browser address bar!");
        location.reload();
        return;
      }

      // Send the clean array directly to the server database
      fetch('/api/rooms', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, playlist })
      })
      .then(res => res.json())
      .then(data => {
        if(data.success) {
          window.location.href = `/room.html?id=${data.roomId}`;
        } else {
          alert("Error launching station: " + data.error);
          location.reload();
        }
      });
    }
  </script>
</body>
</html>
