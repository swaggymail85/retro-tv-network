<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CRT Television Room</title>
  <style>
    body {
      margin: 0; padding: 0; background-color: #0c0c0e;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; overflow: hidden; flex-direction: column;
    }
    .room-ambient { display: flex; justify-content: center; align-items: center; width: 100%; max-width: 900px; position: relative; padding: 40px; }
    .crt-tv-case { background: linear-gradient(135deg, #a1a8b3 0%, #787f8a 100%); padding: 30px 35px 15px 35px; border-radius: 40px 40px 15px 15px; box-shadow: 0 -10px 1px #bdc4cf inset, 0 20px 40px rgba(0,0,0,0.7), inset 0 10px 20px rgba(255,255,255,0.4); width: 650px; z-index: 2; }
    .screen-bezel { background: linear-gradient(to bottom, #434853, #2a2e38); padding: 20px; border-radius: 25px; border: 5px solid #5a606e; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
    .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; box-shadow: inset 0 0 30px rgba(0,0,0,1); background-color: #000; }
    .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .crt-scanlines { position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%); background-size: 100% 4px; pointer-events: none; z-index: 3; }
    .tv-controls-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding: 0 10px; }
    .brand-logo { color: #33363d; font-family: sans-serif; font-weight: bold; letter-spacing: 4px; font-size: 14px; text-shadow: 1px 1px 0px rgba(255,255,255,0.2); }
    .physical-buttons { display: flex; align-items: center; gap: 15px; }
    .led-light { width: 6px; height: 6px; background-color: #39ff14; border-radius: 50%; box-shadow: 0 0 8px #39ff14; }
    #shuffle-btn { background: linear-gradient(to bottom, #8a919e, #5c626e); border: 1px solid #4a4f59; border-bottom: 3px solid #333; color: #222; font-weight: bold; padding: 6px 12px; font-size: 11px; cursor: pointer; border-radius: 4px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.3); transition: transform 0.1s; }
    #shuffle-btn:active { border-bottom-width: 1px; transform: translateY(2px); }
    .tv-remote { position: absolute; right: -20px; bottom: 40px; width: 75px; height: 240px; background: linear-gradient(135deg, #2b2d31 0%, #1a1b1e 100%); border-radius: 15px; box-shadow: 8px 12px 25px rgba(0,0,0,0.6); border: 1px solid #3a3d42; padding: 12px 8px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: space-between; transform: rotate(7deg); z-index: 4; transition: transform 0.2s, right 0.2s; }
    .tv-remote:hover { transform: rotate(0deg) scale(1.05); right: -10px; }
    .remote-brand { color: #5a5d64; font-size: 9px; font-weight: bold; letter-spacing: 2px; }
    .remote-buttons { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; }
    .btn-power { background: none; border: none; font-size: 14px; cursor: pointer; }
    .btn-input { background: #3a3d42; border: 1px solid #555; color: #bbb; font-size: 8px; font-weight: bold; padding: 3px 6px; border-radius: 4px; cursor: pointer; box-shadow: 0 2px 0 #111; }
    .btn-ch { background: #222; border: 1px solid #444; color: #00ff00; font-size: 9px; font-weight: bold; padding: 6px 0; border-radius: 4px; cursor: pointer; width: 90%; box-shadow: 0 2px 0 #000; }
    .desk-items-container { position: absolute; left: 10px; bottom: 30px; display: flex; gap: 20px; opacity: 0.15; pointer-events: none;}
    .ipod-classic { width: 40px; height: 70px; background: #fff; border-radius: 4px; }
    .soda-can { width: 30px; height: 50px; background: green; border-radius: 4px; }
    
    #station-title { color: #8a919e; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px;}
    .back-btn { margin-top: 20px; color: #555; text-decoration: none; font-size: 12px; font-weight: bold; }
    .back-btn:hover { color: #fff; }
  </style>
</head>
<body>

  <div id="station-title">TUNING SIGNAL...</div>

  <div class="room-ambient">
    <div class="crt-tv-case">
      <div class="screen-bezel">
        <div class="video-wrapper">
          <div id="player"></div>
          <div class="crt-scanlines"></div> 
        </div>
      </div>
      
      <div class="tv-controls-bar">
        <div class="brand-logo">SONY</div>
        <div class="physical-buttons">
          <span class="led-light" id="power-led"></span>
          <button id="shuffle-btn">CH <span>▲</span></button>
        </div>
      </div>
    </div>

    <div class="tv-remote">
      <div class="remote-brand">SONY</div>
      <div class="remote-buttons">
        <button class="btn-power">🔴</button>
        <button class="btn-input" id="remote-input">INPUT</button>
        <button class="btn-ch" id="remote-ch">CH +</button>
      </div>
    </div>

    <div class="desk-items-container">
      <div class="ipod-classic"></div>
      <div class="soda-can">DEW</div>
    </div>
  </div>

  <a class="back-btn" href="/">➔ Back to Station Lobby</a>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('id') || 'retro-cartoons';

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    let player;

    function onYouTubeIframeAPIReady() {
      fetch(`/api/rooms/${roomId}`)
        .then(res => res.json())
        .then(roomData => {
          document.getElementById('station-title').innerText = `📡 NOW BROADCASTING: ${roomData.name.toUpperCase()}`;
          
player = new YT.Player('player', {
  videoId: roomData.videoId,
  playerVars: {
    'autoplay': 1,
    'mute': 1, // 👈 CRUCIAL ADDITION FOR 2026 WEB BROWSERS
    'modestbranding': 1,
    'rel': 0,
    'controls': 1,
    'startSeconds': roomData.seekTo,
    'origin': window.location.origin // 👈 THIS FIXES THE VPS DOMAIN BLOCK
  }
});
        })
        .catch(err => {
          document.getElementById('station-title').innerText = "❌ STATIC DETECTED - SIGNAL NOT FOUND";
        });
    }

    document.getElementById('shuffle-btn').addEventListener('click', () => location.reload());
    document.getElementById('remote-ch').addEventListener('click', () => location.reload());
  </script>
</body>
</html>
