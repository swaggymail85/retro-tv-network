<script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('id') || 'retro-cartoons';

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    let player;

    function onYouTubeIframeAPIReady() {
      fetch(`/api/rooms/${roomId}`)
        .then(res => res.json())
        .then(roomData => {
          document.getElementById('station-title').innerText = `📡 NOW BROADCASTING: ${roomData.name.toUpperCase()}`;
          
          // Check if the user previously had a volume saved (default to 100 if new)
          const savedVolume = localStorage.getItem('tv_volume');
          const finalVolume = savedVolume !== null ? parseInt(savedVolume) : 100;
          
          // If they setting it to 0, start muted. Otherwise start unmuted.
          const shouldMute = finalVolume === 0 ? 1 : 0;

          player = new YT.Player('player', {
            videoId: roomData.videoId,
            playerVars: {
              'autoplay': 1,
              'mute': shouldMute, // Dynamic mute based on user's history!
              'modestbranding': 1,
              'rel': 0,
              'controls': 1,
              'startSeconds': roomData.seekTo,
              'origin': window.location.origin
            },
            events: {
              'onReady': (event) => {
                // Set the exact volume level they left it at
                event.target.setVolume(finalVolume);
                
                // Track volume adjustments so we can remember changes
                setInterval(() => {
                  if (player && typeof player.getVolume === 'function') {
                    const currentVol = player.getVolume();
                    localStorage.setItem('tv_volume', currentVol);
                  }
                }, 1000);
              }
            }
          });
        })
        .catch(err => {
          document.getElementById('station-title').innerText = "❌ STATIC DETECTED - SIGNAL NOT FOUND";
        });
    }

    function changeChannelTrack() {
      // Intentionally save the volume state one last time right before navigating away
      if (player && typeof player.getVolume === 'function') {
        localStorage.setItem('tv_volume', player.getVolume());
      }
      
      fetch(`/api/rooms/${roomId}/next`, { method: 'POST' })
        .then(() => location.reload());
    }

    document.getElementById('shuffle-btn').addEventListener('click', changeChannelTrack);
    document.getElementById('remote-ch').addEventListener('click', changeChannelTrack);
  </script>
